name: Build macOS PKG

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  APP_NAME: GorizontVS-VDI
  APP_BUNDLE: GorizontVS-VDI.app
  APP_VERSION: "1.8"
  PKG_IDENTIFIER: ru.gorizont.vdi
  MACOSX_DEPLOYMENT_TARGET: "14.0"
  HOMEBREW_NO_AUTO_UPDATE: "1"
  HOMEBREW_NO_INSTALL_CLEANUP: "1"

jobs:
  build-pkg:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Runner info
        shell: bash
        run: |
          set -euxo pipefail
          sw_vers
          uname -a
          arch
          which pkgbuild
          which productbuild

      - name: Install dependencies
        shell: bash
        run: |
          set -euxo pipefail

          brew update

          brew install \
            python@3.13 \
            krb5 \
            pkg-config

          echo "/opt/homebrew/bin" >> "$GITHUB_PATH"
          echo "/opt/homebrew/sbin" >> "$GITHUB_PATH"

      - name: Prepare Python venv
        shell: bash
        run: |
          set -euxo pipefail

          /opt/homebrew/bin/python3.13 -m venv venv
          source venv/bin/activate

          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install pyparsing krb5 nuitka ordered-set zstandard imageio

          python --version
          pip --version

      - name: Build client app
        shell: bash
        run: |
          set -euxo pipefail

          source venv/bin/activate

          export PATH="/opt/homebrew/bin:/opt/homebrew/sbin:$PATH"
          export MACOSX_DEPLOYMENT_TARGET="14.0"

          ./rebuild.sh

          rm -rf dist
          mkdir -p dist

          pyside6-deploy -c pysidedeploy.mac.spec

          test -d "dist/GorizontVS-VDI.app"
          test -x "dist/GorizontVS-VDI.app/Contents/MacOS/GorizontVS-VDI"

      - name: Build PKG from dist app as-is
        shell: bash
        run: |
          set -euxo pipefail

          chmod +x ci/macos/build_pkg_as_is.sh
          ci/macos/build_pkg_as_is.sh

      - name: Verify PKG
        shell: bash
        run: |
          set -euxo pipefail

          ls -lh build/*.pkg

          pkgutil --payload-files build/component.pkg | head -300

          rm -rf /tmp/pkg-expand

          PKG_FILE="$(ls build/GorizontVS-VDI-As-Is-*.pkg | head -n 1)"
          pkgutil --expand-full "$PKG_FILE" /tmp/pkg-expand

          find /tmp/pkg-expand -maxdepth 5 -type f | sort | head -500

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GorizontVS-VDI-as-is-pkg-macos14-arm64
          path: build/GorizontVS-VDI-As-Is-*.pkg
