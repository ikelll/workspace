name: Build macOS PKG

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  APP_NAME: GorizontVS-VDI
  APP_BUNDLE: GorizontVS-VDI.app
  APP_VERSION: "1.8"
  PKG_IDENTIFIER: ru.gorizont.vdi
  MACOSX_DEPLOYMENT_TARGET: "14.0"
  HOMEBREW_NO_AUTO_UPDATE: "1"
  HOMEBREW_NO_INSTALL_CLEANUP: "1"

jobs:
  build-pkg:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Runner info
        shell: bash
        run: |
          set -euxo pipefail

          echo "=== Runner ==="
          sw_vers
          uname -a
          arch

          echo "=== Tools ==="
          which pkgbuild
          which productbuild
          which python3 || true
          which brew || true

          echo "=== Git ==="
          git rev-parse HEAD
          git log -1 --oneline

      - name: Install dependencies
        shell: bash
        run: |
          set -euxo pipefail

          brew update

          brew install \
            python@3.13 \
            ccache \
            krb5 \
            gstreamer \
            gst-plugins-base \
            gst-plugins-good \
            gst-plugins-bad \
            gst-libav \
            glib \
            pixman \
            meson \
            ninja \
            phodav \
            opus \
            jpeg-turbo \
            openssl@3 \
            libusb \
            gettext \
            cyrus-sasl \
            pkg-config \
            ffmpeg \
            x264 \
            x265 \
            aom \
            dav1d \
            libvpx \
            svt-av1 \
            libogg \
            libvorbis \
            flac \
            lame \
            fdk-aac \
            opusfile \
            libass \
            libpng \
            webp \
            jpeg-xl

          echo "/opt/homebrew/bin" >> "$GITHUB_PATH"
          echo "/opt/homebrew/sbin" >> "$GITHUB_PATH"
          echo "/opt/homebrew/opt/ccache/libexec" >> "$GITHUB_PATH"

          /opt/homebrew/bin/python3 -m pip install pyparsing --break-system-packages
          /opt/homebrew/bin/python3 -c "import pyparsing; print('pyparsing OK')"

      - name: Python venv
        shell: bash
        run: |
          set -euxo pipefail

          /opt/homebrew/bin/python3.13 -m venv venv
          source venv/bin/activate

          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

          # Nuitka фиксируем, чтобы CI не начал внезапно падать из-за новой версии.
          pip install pyparsing krb5 "nuitka==2.7.14" ordered-set zstandard imageio

          python --version
          pip --version

      - name: Build SPICE
        shell: bash
        run: |
          set -euxo pipefail

          source venv/bin/activate

          rm -rf spice-full
          unzip spice-full.zip

          cp makefiles/Makefile spice-full/Makefile
          cp makefiles/meson.build-gtk-tools spice-full/spice-gtk/tools/meson.build
          cp makefiles/spicy.c spice-full/spice-gtk/tools/spicy.c

          cd spice-full

          export PATH="/opt/homebrew/opt/ccache/libexec:/opt/homebrew/bin:/opt/homebrew/sbin:$PATH"
          export PKG_CONFIG_PATH="/opt/homebrew/opt/cyrus-sasl/lib/pkgconfig:/opt/homebrew/lib/pkgconfig:/opt/homebrew/share/pkgconfig:${PKG_CONFIG_PATH:-}"
          export CPPFLAGS="-I/opt/homebrew/include"
          export LDFLAGS="-L/opt/homebrew/lib"
          export MACOSX_DEPLOYMENT_TARGET="14.0"

          pkg-config --modversion libsasl2
          pkg-config --libs libsasl2

          mkdir -p build/spice/usr/share/locale/ru/LC_MESSAGES

          make

          echo "=== Built SPICE files preview ==="
          find build/spice -maxdepth 6 -type f | sort | head -300

          echo "=== spicy check ==="
          find build/spice -type f -name spicy -print
          test -x build/spice/opt/homebrew/bin/spicy

      - name: Build client app
        shell: bash
        run: |
          set -euxo pipefail

          source venv/bin/activate

          export PATH="/opt/homebrew/opt/ccache/libexec:/opt/homebrew/bin:/opt/homebrew/sbin:$PATH"
          export PKG_CONFIG_PATH="/opt/homebrew/lib/pkgconfig:/opt/homebrew/share/pkgconfig:${PKG_CONFIG_PATH:-}"
          export MACOSX_DEPLOYMENT_TARGET="14.0"

          echo "=== Source state ==="
          git rev-parse HEAD
          git status --short

          echo "=== Clean old Nuitka/PySide build artifacts ==="
          rm -rf dist build
          rm -rf .nuitka-build
          rm -rf *.build *.dist *.onefile-build
          find . -name '*.pyc' -delete
          find . -name '__pycache__' -type d -prune -exec rm -rf {} + 2>/dev/null || true

          ./rebuild.sh

          mkdir -p dist

          echo "=== Build app with pyside6-deploy ==="
          pyside6-deploy -c pysidedeploy.mac.spec

          test -d "dist/GorizontVS-VDI.app"
          test -x "dist/GorizontVS-VDI.app/Contents/MacOS/GorizontVS-VDI"

          echo "=== Dist app check ==="
          ls -la "dist/GorizontVS-VDI.app"
          ls -la "dist/GorizontVS-VDI.app/Contents"
          ls -la "dist/GorizontVS-VDI.app/Contents/MacOS"

          if [ -e "dist/GorizontVS-VDI.app/Contents/MacOS/GorizontVS-VDI.real" ]; then
            echo "ERROR: unexpected GorizontVS-VDI.real in clean dist"
            exit 1
          fi

      - name: Create PKG from scratch
        shell: bash
        run: |
          set -euxo pipefail

          chmod +x ci/macos/build_pkg.sh
          chmod +x ci/macos/bundle_dylibs.sh
          chmod +x ci/macos/postinstall

          ci/macos/build_pkg.sh

      - name: Verify PKG
        shell: bash
        run: |
          set -euxo pipefail

          echo "=== BUILD DIR ==="
          ls -lh build/*.pkg

          PKG_FILE="$(ls build/GorizontVS-VDI-Client-Setup-*.pkg | head -n 1)"
          echo "PKG_FILE=$PKG_FILE"

          echo "=== PKG SHA256 ==="
          shasum -a 256 "$PKG_FILE"

          echo "=== FINAL PKG PAYLOAD FILES ==="
          pkgutil --payload-files "$PKG_FILE" | head -300

          echo "=== COMPONENT PAYLOAD FILES ==="
          pkgutil --payload-files build/component.pkg | head -300

          echo "=== MUST CONTAIN Applications/GorizontVS-VDI.app ==="
          if ! pkgutil --payload-files "$PKG_FILE" | grep -q '^Applications/GorizontVS-VDI.app'; then
            echo "ERROR: final pkg does not install to /Applications/GorizontVS-VDI.app"
            echo "=== Actual payload start ==="
            pkgutil --payload-files "$PKG_FILE" | head -100
            exit 1
          fi

          echo "=== MUST CONTAIN main executable ==="
          if ! pkgutil --payload-files "$PKG_FILE" | grep -q '^Applications/GorizontVS-VDI.app/Contents/MacOS/GorizontVS-VDI$'; then
            echo "ERROR: final pkg does not contain main executable at expected path"
            pkgutil --payload-files "$PKG_FILE" | grep 'GorizontVS-VDI' | head -100
            exit 1
          fi

          echo "=== MUST NOT CONTAIN .real wrapper binary ==="
          if pkgutil --payload-files "$PKG_FILE" | grep -q 'GorizontVS-VDI.real'; then
            echo "ERROR: final pkg contains forbidden GorizontVS-VDI.real"
            pkgutil --payload-files "$PKG_FILE" | grep 'GorizontVS-VDI.real'
            exit 1
          fi

          rm -rf /tmp/pkg-expand
          pkgutil --expand-full "$PKG_FILE" /tmp/pkg-expand

          echo "=== EXPANDED APP DIRS ==="
          find /tmp/pkg-expand -maxdepth 10 -type d -name "*.app" -print

          echo "=== EXPANDED Gorizont binary ==="
          find /tmp/pkg-expand -maxdepth 12 -type f -name "GorizontVS-VDI" -print

          echo "=== EXPANDED TREE PREVIEW ==="
          find /tmp/pkg-expand -maxdepth 7 -type f | sort | head -500

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GorizontVS-VDI-pkg-macos14-arm64
          path: build/GorizontVS-VDI-Client-Setup-*.pkg
